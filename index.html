<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Tracker</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #0a0a0a; /* Obsidian Dark */
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevent scrolling if logos touch edges */
        }

        .logo-top-right {
            position: absolute;
            top: 2rem;
            right: 2rem;
            max-width: 150px; /* Adjust as needed */
            height: auto;
            border-radius: 8px; /* Slight rounding for pure aesthetic */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5); /* Deep shadow */
        }

        .logo-bottom-left {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            max-width: 300px; /* Adjust as needed */
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        
        /* Optional: Add a subtle ambient glow to the background for premium feel */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <img src="AAog.png" alt="AAog Logo" class="logo-top-right">
    <img src="Hermetic Labs Logo Banner.png" alt="Hermetic Labs Logo" class="logo-bottom-left">
</body>
</html>
